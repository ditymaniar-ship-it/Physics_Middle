<!DOCTYPE html>
<html>
<head>
<title>Forest Treasure Hunt – Force & Pressure</title>
<style>

body{
margin:0;
background:#0b3d0b;
font-family:Arial;
color:white;
text-align:center;
}

#info{
padding:40px;
}

#gameContainer{
display:none;
position:relative;
width:900px;
margin:auto;
}

canvas{
background:#2e8b57;
border:4px solid white;
}

#ui{
margin-top:10px;
}

#questionBox{
position:absolute;
top:120px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.9);
padding:20px;
border-radius:10px;
width:400px;
display:none;
}

.option{
display:block;
margin:8px;
padding:10px;
background:#444;
cursor:pointer;
border-radius:6px;
}

.option:hover{
background:#666;
}

</style>
</head>

<body>

<div id="info">

<h1>🌲 Forest Treasure Hunt</h1>

<p>
Move your explorer through the forest paths.<br>
Animals will appear and ask questions about <b>Force and Pressure</b>.
</p>

<p>
🎮 Move: Arrow Keys / WASD<br>
🗝 Collect 4 keys to open the treasure chest.
</p>

<button onclick="startGame()">▶ Start Adventure</button>

</div>

<div id="gameContainer">

<canvas id="gameCanvas" width="900" height="500"></canvas>

<div id="ui">
Keys Collected: <span id="keys">0</span>/4
</div>

<div id="questionBox">
<h3 id="questionText"></h3>
<div id="options"></div>
</div>

</div>

<script>

let canvas=document.getElementById("gameCanvas")
let ctx=canvas.getContext("2d")

let player={x:100,y:250,size:20}
let keys=0

let animals=[]
let paths=[
{x:0,y:220,w:900,h:60},
{x:400,y:0,w:60,h:500}
]

let questions=[

{q:"A push or pull on an object is called:",o:["Force","Energy","Speed","Mass"],a:0},
{q:"Force per unit area is:",o:["Speed","Pressure","Energy","Momentum"],a:1},
{q:"Which force pulls objects to Earth?",o:["Magnetic","Friction","Gravity","Tension"],a:2},
{q:"Why do camels have broad feet?",o:["Increase pressure","Reduce pressure","Increase mass","Reduce gravity"],a:1},
{q:"Sharp knives cut better because:",o:["More pressure","Less force","Less mass","More speed"],a:0},
{q:"Which is a contact force?",o:["Gravity","Friction","Magnetism","Electrostatic"],a:1},
{q:"Tractors have wide tyres to:",o:["Increase pressure","Reduce pressure","Increase force","Reduce speed"],a:1},
{q:"Pressure increases when:",o:["Area increases","Area decreases","Force decreases","Mass decreases"],a:1}

]

function startGame(){

document.getElementById("info").style.display="none"
document.getElementById("gameContainer").style.display="block"

spawnAnimals()

gameLoop()

}

function spawnAnimals(){

setInterval(()=>{

animals.push({
x:Math.random()*850,
y:Math.random()*450,
size:20
})

},4000)

}

function drawPaths(){

ctx.fillStyle="#a0522d"

paths.forEach(p=>{
ctx.fillRect(p.x,p.y,p.w,p.h)
})

}

function drawPlayer(){

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(player.x,player.y,player.size,0,Math.PI*2)
ctx.fill()

}

function drawAnimals(){

ctx.fillStyle="orange"

animals.forEach(a=>{
ctx.beginPath()
ctx.arc(a.x,a.y,a.size,0,Math.PI*2)
ctx.fill()
})

}

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawPaths()
drawPlayer()
drawAnimals()

checkCollisions()

requestAnimationFrame(gameLoop)

}

document.addEventListener("keydown",e=>{

let speed=5

if(e.key==="ArrowUp"||e.key==="w") player.y-=speed
if(e.key==="ArrowDown"||e.key==="s") player.y+=speed
if(e.key==="ArrowLeft"||e.key==="a") player.x-=speed
if(e.key==="ArrowRight"||e.key==="d") player.x+=speed

})

function checkCollisions(){

animals.forEach((a,i)=>{

let dx=player.x-a.x
let dy=player.y-a.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<30){

animals.splice(i,1)
showQuestion()

}

})

}

function showQuestion(){

let q=questions[Math.floor(Math.random()*questions.length)]

let box=document.getElementById("questionBox")
box.style.display="block"

document.getElementById("questionText").innerText=q.q

let optDiv=document.getElementById("options")
optDiv.innerHTML=""

q.o.forEach((opt,i)=>{

let div=document.createElement("div")
div.className="option"
div.innerText=opt

div.onclick=()=>{

playSound()

if(i==q.a){

keys++
document.getElementById("keys").innerText=keys

if(keys>=4){
alert("🏆 Treasure Unlocked! Pressure = Force / Area")
}

}

box.style.display="none"

}

optDiv.appendChild(div)

})

}

function playSound(){

let ctx=new AudioContext()
let osc=ctx.createOscillator()
osc.type="sine"
osc.frequency.value=600
osc.connect(ctx.destination)
osc.start()
osc.stop(ctx.currentTime+0.15)

}

</script>

</body>
</html>
