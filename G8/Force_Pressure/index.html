<!DOCTYPE html>
<html>
<head>
<title>Forest Map Physics Adventure</title>

<style>

body{
font-family:Arial;
text-align:center;
background-image:url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e");
background-size:cover;
color:white;
}

#game{
background:rgba(0,0,0,0.75);
width:70%;
margin:auto;
margin-top:40px;
padding:30px;
border-radius:12px;
}

.map{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.location{
padding:30px;
background:#2c3e50;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

button{
display:block;
margin:10px auto;
padding:12px;
font-size:16px;
width:60%;
border-radius:6px;
border:none;
cursor:pointer;
}

.correct{background:#27ae60;}
.wrong{background:#e74c3c;}

</style>

</head>

<body>

<div id="game">

<h1>🌲 Forest Map Adventure</h1>

<p>
You are an explorer searching for hidden treasure.  
Animals in different forest locations will test your physics knowledge!
</p>

<h2>🗺 Choose a Forest Location</h2>

<div class="map">

<div class="location" onclick="fox()">🦊 Fox Den</div>
<div class="location" onclick="deer()">🦌 River Bank</div>
<div class="location" onclick="bear()">🐻 Cave</div>
<div class="location" onclick="owl()">🦉 Tall Tree</div>
<div class="location" onclick="treasure()">🏆 Treasure Chest</div>

</div>

<p id="msg"></p>

</div>

<script>

let foxDone=false
let deerDone=false
let bearDone=false
let owlDone=false

function fox(){

document.getElementById("game").innerHTML=`

<h2>🦊 Fox Question</h2>

<p>
A lumberjack pushes a heavy log in the forest.

What is the push or pull acting on the log called?
</p>

<button onclick="checkFox(false)">Energy</button>
<button onclick="checkFox(true)">Force</button>
<button onclick="checkFox(false)">Heat</button>
<button onclick="checkFox(false)">Light</button>

`

}

function checkFox(correct){

if(correct){
foxDone=true
alert("Correct! You unlocked Fox Den clue.")
location.reload()
}else{
alert("Try again!")
}

}

function deer(){

document.getElementById("game").innerHTML=`

<h2>🦌 Deer Question</h2>

<p>
A deer walks on soft mud and its hooves leave deep marks.

What concept explains this effect?
</p>

<button onclick="checkDeer(false)">Speed</button>
<button onclick="checkDeer(true)">Pressure</button>
<button onclick="checkDeer(false)">Momentum</button>
<button onclick="checkDeer(false)">Temperature</button>

`

}

function checkDeer(correct){

if(correct){
deerDone=true
alert("Correct! River Bank clue unlocked.")
location.reload()
}else{
alert("Try again!")
}

}

function bear(){

document.getElementById("game").innerHTML=`

<h2>🐻 Bear Question</h2>

<p>
A heavy bear presses the ground with its weight.

Which formula represents pressure?
</p>

<button onclick="checkBear(false)">Force × Area</button>
<button onclick="checkBear(true)">Force / Area</button>
<button onclick="checkBear(false)">Area / Force</button>
<button onclick="checkBear(false)">Mass × Velocity</button>

`

}

function checkBear(correct){

if(correct){
bearDone=true
alert("Correct! Cave clue unlocked.")
location.reload()
}else{
alert("Try again!")
}

}

function owl(){

document.getElementById("game").innerHTML=`

<h2>🦉 Owl Question</h2>

<p>
Why do sharp knives cut better than blunt knives?
</p>

<button onclick="checkOwl(false)">They are heavier</button>
<button onclick="checkOwl(true)">They produce more pressure</button>
<button onclick="checkOwl(false)">They move faster</button>
<button onclick="checkOwl(false)">They reduce force</button>

`

}

function checkOwl(correct){

if(correct){
owlDone=true
alert("Correct! Owl clue unlocked.")
location.reload()
}else{
alert("Try again!")
}

}

function treasure(){

if(foxDone && deerDone && bearDone && owlDone){

document.getElementById("game").innerHTML=`

<h1>🏆 TREASURE FOUND!</h1>

<h2>Secret Formula</h2>

<h2>Pressure = Force / Area</h2>

<p>
You solved all the forest physics mysteries!
</p>

`

}

else{

alert("Solve all animal clues before opening the treasure!")

}

}

</script>

</body>
</html>
